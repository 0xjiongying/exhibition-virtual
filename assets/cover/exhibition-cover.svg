<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Hand by Hand exhibition cover  creator-owned architecture mark">
  <title>Hand by Hand  Exhibition Cover</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="55%" stop-color="#050607"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8d0dc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8a94a4" stop-opacity="0.06"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#sky)"/>
  <!-- museum massing  creator-owned architectural mark, not third-party art -->
  <rect x="180" y="320" width="840" height="520" fill="#0e1014" stroke="#2a3038" stroke-width="2"/>
  <rect x="220" y="360" width="760" height="40" fill="#1a1e24"/>
  <!-- skylight ribbon -->
  <rect x="540" y="320" width="120" height="520" fill="url(#glass)"/>
  <g stroke="#6a7480" stroke-width="1.5" opacity="0.55">
    <line x1="540" y1="420" x2="660" y2="420"/>
    <line x1="540" y1="520" x2="660" y2="520"/>
    <line x1="540" y1="620" x2="660" y2="620"/>
    <line x1="540" y1="720" x2="660" y2="720"/>
  </g>
  <!-- threshold aperture -->
  <rect x="470" y="620" width="260" height="220" fill="#030405" stroke="#9aa4b0" stroke-width="1.5"/>
  <rect x="510" y="660" width="180" height="180" fill="#101418"/>
  <!-- cool spill -->
  <ellipse cx="600" cy="840" rx="220" ry="28" fill="#a8b4c4" opacity="0.08"/>
  <!-- wordmark -->
  <text x="600" y="980" text-anchor="middle" fill="#f2f2f0" font-family="Segoe UI, Avenir Next, Helvetica, Arial, sans-serif" font-size="34" letter-spacing="14" font-weight="600">HAND BY HAND</text>
  <text x="600" y="1024" text-anchor="middle" fill="#8a929c" font-family="Segoe UI, Avenir Next, Helvetica, Arial, sans-serif" font-size="16" letter-spacing="6">EXHIBITION EXPERIENCE � ARCHITECTURE MARK</text>
</svg>

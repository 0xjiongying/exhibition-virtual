<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hand by Hand — A Virtual Exhibition</title>
<style>
  :root {
    --ink: #f2f2f0;
    --paper: #000000;
    --muted: rgba(242, 242, 240, .48);
    --hairline: rgba(242, 242, 240, .14);
    --glass: rgba(8, 8, 8, .62);
    --glass-strong: rgba(16, 16, 16, .78);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: var(--paper); }
  body {
    font-family: "Avenir Next", "Segoe UI Variable Display", "Segoe UI", -apple-system, system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    cursor: none;
  }
  canvas.webgl { position: fixed; inset: 0; display: block; }

  /* ---------- cinematic dressing ---------- */
  #vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 4;
    background: radial-gradient(ellipse at 50% 48%, transparent 48%, rgba(0,0,0,.42) 78%, rgba(0,0,0,.72) 100%);
  }
  #grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 5;
    opacity: .032; image-rendering: pixelated;
  }
  .bar {
    position: fixed; left: 0; right: 0; height: 0; background: #000; z-index: 6;
    transition: height 1.6s cubic-bezier(.6, 0, .2, 1); pointer-events: none;
  }
  #barTop { top: 0; } #barBottom { bottom: 0; }
  body.cinema .bar { height: 7.2vh; }
  #fade {
    position: fixed; inset: 0; background: #000; z-index: 20;
    pointer-events: none; transition: opacity 3.2s ease;
  }

  /* ---------- typography — one light-on-dark system for film + explore ---------- */
  #wordmark {
    position: fixed; top: 34px; left: 42px; z-index: 8; pointer-events: none;
    transition: opacity 1s ease; color: var(--ink);
  }
  #wordmark h1 {
    font-size: 13px; font-weight: 600; letter-spacing: .34em; text-transform: uppercase;
  }
  #wordmark p {
    margin-top: 6px; font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    color: var(--muted);
  }

  #caption {
    position: fixed; left: 50%; bottom: 11.5vh; transform: translateX(-50%);
    z-index: 8; text-align: center; pointer-events: none; width: min(72ch, 86vw);
    opacity: 0; transition: opacity 2.2s ease;
  }
  #caption.show { opacity: 1; }
  #caption .kicker {
    font-size: 10px; letter-spacing: .42em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px;
  }
  #caption .line {
    font-size: clamp(17px, 2.4vw, 27px); font-weight: 500; letter-spacing: .04em;
    color: var(--ink); line-height: 1.5;
  }

  /* artwork focus panel (explore mode) */
  #plate {
    position: fixed; left: 42px; bottom: 42px; z-index: 8; max-width: 340px;
    opacity: 0; transform: translateY(8px);
    transition: opacity 1.1s ease, transform 1.1s ease; pointer-events: none;
    padding: 18px 20px;
    background: var(--glass);
    border: 1px solid var(--hairline);
    backdrop-filter: blur(14px);
  }
  #plate.show { opacity: 1; transform: none; }
  #plate .rule { width: 34px; height: 1px; background: var(--ink); opacity: .35; margin-bottom: 14px; }
  #plate h2 { font-size: 19px; font-weight: 600; letter-spacing: .02em; }
  #plate .meta { margin-top: 6px; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); }
  #plate .desc { margin-top: 12px; font-size: 13.5px; line-height: 1.65; color: rgba(242,242,240,.72); }

  /* ---------- controls — quieter smoked glass ---------- */
  #controls {
    position: fixed; right: 42px; bottom: 36px; z-index: 9; display: flex; gap: 6px;
    transition: opacity 1s ease;
  }
  #controls button {
    font: inherit; font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    padding: 9px 16px; border: 1px solid var(--hairline); border-radius: 2px;
    background: var(--glass); color: rgba(242,242,240,.82); cursor: none;
    backdrop-filter: blur(12px); transition: background .35s, color .35s, border-color .35s;
  }
  #controls button:hover { border-color: rgba(242,242,240,.32); color: var(--ink); }
  #controls button.active {
    background: var(--glass-strong); color: var(--ink);
    border-color: rgba(242,242,240,.38);
  }

  #hint {
    position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%); z-index: 8;
    font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
    opacity: 0; transition: opacity 1.4s ease; pointer-events: none; text-align: center;
  }
  #hint.show { opacity: 1; }

  /* ---------- humanized cursor ---------- */
  #cursor {
    position: fixed; z-index: 30; width: 10px; height: 10px; border-radius: 50%;
    background: var(--ink); pointer-events: none; top: 0; left: 0;
    transform: translate(-50%, -50%);
    transition: width .35s ease, height .35s ease, background .5s ease, opacity .6s ease;
  }
  #cursorRing {
    position: fixed; z-index: 29; width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid rgba(242,242,240,.28); pointer-events: none; top: 0; left: 0;
    transform: translate(-50%, -50%);
    transition: width .45s ease, height .45s ease, border-color .5s ease, opacity .6s ease;
  }
  body.cursor-hot #cursor { width: 5px; height: 5px; }
  body.cursor-hot #cursorRing { width: 52px; height: 52px; border-color: rgba(242,242,240,.45); }
  body.cursor-idle #cursor, body.cursor-idle #cursorRing { opacity: 0; }

  @media (prefers-reduced-motion: reduce) {
    .bar, #fade, #wordmark, #caption, #plate, #controls, #hint, #cursor, #cursorRing {
      transition-duration: .2s !important;
    }
  }

  /* ---------- Phase 1 product layer — smoked glass, museum-calm ---------- */
  #productControls {
    position: fixed; right: 42px; bottom: 84px; z-index: 9;
    display: flex; gap: 6px; pointer-events: auto;
  }
  #productControls .mp-btn,
  #controls button,
  .mp-panel button,
  .mp-panel input,
  .mp-footer {
    cursor: pointer;
  }
  .mp-btn {
    font: inherit; font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    padding: 9px 14px; border: 1px solid var(--hairline); border-radius: 2px;
    background: var(--glass); color: rgba(242,242,240,.82);
    backdrop-filter: blur(12px); transition: background .35s, color .35s, border-color .35s;
  }
  .mp-btn:hover { border-color: rgba(242,242,240,.32); color: var(--ink); }
  .mp-btn.active, .mp-chips button.active {
    background: var(--glass-strong); color: var(--ink);
    border-color: rgba(242,242,240,.38);
  }
  .mp-btn:disabled { opacity: .45; cursor: default; }
  .mp-btn-inline { letter-spacing: .12em; padding: 7px 12px; font-size: 10px; }

  .mp-footer {
    position: fixed; left: 42px; bottom: 14px; z-index: 8;
    max-width: min(52ch, 46vw); font-size: 10px; letter-spacing: .06em;
    line-height: 1.45; color: rgba(242,242,240,.38); pointer-events: none;
  }

  .mp-panel {
    position: fixed; top: 96px; right: 42px; z-index: 12;
    width: min(360px, calc(100vw - 48px)); max-height: calc(100vh - 160px);
    overflow: auto; padding: 22px 22px 18px;
    background: var(--glass-strong); border: 1px solid var(--hairline);
    backdrop-filter: blur(18px); color: var(--ink);
    pointer-events: auto; cursor: default;
  }
  .mp-panel[hidden] { display: none !important; }
  .mp-panel-h {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 12px; margin-bottom: 12px;
  }
  .mp-panel-h h3 {
    font-size: 12px; font-weight: 600; letter-spacing: .28em; text-transform: uppercase;
  }
  .mp-close {
    font: inherit; font-size: 18px; line-height: 1; border: 0; background: transparent;
    color: var(--muted); padding: 0 4px;
  }
  .mp-muted { color: var(--muted); font-size: 12px; line-height: 1.55; }
  .mp-body { font-size: 13px; line-height: 1.55; color: rgba(242,242,240,.78); margin-top: 4px; }
  .mp-fine { margin-top: 16px; font-size: 11px; line-height: 1.5; color: rgba(242,242,240,.4); }
  .mp-block { margin-top: 18px; }
  .mp-block h4 {
    font-size: 10px; letter-spacing: .24em; text-transform: uppercase; color: var(--muted);
  }
  .mp-pill {
    display: inline-block; margin-left: 6px; padding: 1px 6px;
    border: 1px solid var(--hairline); font-size: 9px; letter-spacing: .14em;
  }
  .mp-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 10px; }
  .mp-badge {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
    padding-top: 10px; border-top: 1px solid rgba(242,242,240,.08);
  }
  .mp-badge strong { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; }
  .mp-badge .mp-muted { font-size: 11px; }
  .mp-log {
    margin: 14px 0; max-height: 220px; overflow: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  .mp-msg p { font-size: 13.5px; line-height: 1.6; color: rgba(242,242,240,.84); }
  .mp-msg.mp-user p { color: var(--muted); }
  .mp-msg small { display: block; margin-top: 6px; font-size: 10px; letter-spacing: .08em; }
  .mp-form { display: flex; gap: 8px; margin-top: 8px; }
  .mp-form input, .mp-search {
    flex: 1; font: inherit; font-size: 13px; color: var(--ink);
    background: rgba(0,0,0,.35); border: 1px solid var(--hairline);
    padding: 10px 12px; border-radius: 2px; outline: none;
  }
  .mp-search { width: 100%; margin: 12px 0 8px; }
  .mp-form input:focus, .mp-search:focus { border-color: rgba(242,242,240,.35); }
  .mp-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .mp-chips button {
    font: inherit; font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
    padding: 6px 10px; border: 1px solid var(--hairline); border-radius: 2px;
    background: transparent; color: rgba(242,242,240,.7);
  }
  .mp-chips button:hover { color: var(--ink); border-color: rgba(242,242,240,.3); }
  .mp-navlist button.mp-link {
    display: block; width: 100%; text-align: left; border: 0; background: transparent;
    color: inherit; padding: 8px 0; border-top: 1px solid rgba(242,242,240,.08);
  }
  .mp-navlist strong { display: block; font-size: 13px; font-weight: 600; }
  .mp-navlist .mp-muted { font-size: 11px; }

  @media (max-width: 720px) {
    #productControls { right: 16px; bottom: 78px; flex-wrap: wrap; justify-content: flex-end; max-width: 70vw; }
    .mp-panel { right: 16px; top: 72px; }
    .mp-footer { left: 16px; max-width: 90vw; bottom: 10px; font-size: 9px; }
  }
</style>
</head>
<body class="cinema cursor-idle">
  <canvas class="webgl" id="stage"></canvas>

  <div class="bar" id="barTop"></div>
  <div class="bar" id="barBottom"></div>
  <div id="vignette"></div>
  <canvas id="grain"></canvas>
  <div id="fade"></div>

  <header id="wordmark">
    <h1>Hand by Hand</h1>
    <p>Humanity &amp; Technology · A Virtual Exhibition</p>
  </header>

  <div id="caption"><div class="kicker"></div><div class="line"></div></div>

  <aside id="plate">
    <div class="rule"></div>
    <h2></h2>
    <div class="meta"></div>
    <div class="desc"></div>
  </aside>

  <div id="hint"></div>

  <nav id="controls">
    <button id="btnFilm" class="active">Film</button>
    <button id="btnExplore">Explore</button>
    <button id="btnSound">Sound</button>
  </nav>

  <div id="cursorRing"></div>
  <div id="cursor"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
